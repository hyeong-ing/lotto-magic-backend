server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

spring:
  application:
    name: lotto-backend

  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

info:
  app:
    name: lotto-backend
    description: 로또 번호 생성 마법진 운영 서버
    version: v1.0.0

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:3000}