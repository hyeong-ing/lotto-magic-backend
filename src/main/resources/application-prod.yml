springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:3000}